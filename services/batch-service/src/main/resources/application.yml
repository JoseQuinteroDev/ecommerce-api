spring:
  application:
    name: batch-service
  datasource:
    url: jdbc:mysql://localhost:3306/batch_db
    username: root
    password: ${MYSQL_ROOT_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  batch:
    jdbc:
      initialize-schema: always
server:
  port: 8088
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
security:
  jwt:
    secret: ${JWT_SECRET:change-me-super-secret-key-32chars}
